version: '3.8'

services:
  api:
    build: .
    ports:
      - "8001:8001"
    environment:
      - ALLOWED_ORIGINS=http://localhost:8001
      - JWT_SECRET=${JWT_SECRET}
      - API_KEY=${API_KEY}
      - ALLOWED_DOMAINS=${ALLOWED_DOMAINS}
    restart: unless-stopped

  # Otros servicios (db/redis/web) se agregarán en arquitectura avanzada
